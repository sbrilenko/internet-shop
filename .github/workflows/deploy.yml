name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Login to AWS
        uses: aws-actions/login@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: 'us-west-2'
      - name: Deploy to AWS
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve
      - name: Build and deploy lambda
        run: |
          cd src
          zip lambda.zip app.js db.js
          aws lambda update-function-code --function-name internet-shop-lambda --zip-file fileb://lambda.zip